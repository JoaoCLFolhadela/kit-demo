services:
  mnist-augment:
    build: .
    container_name: mnist-augment
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - mnist_data:/app/data
      - mnist_outputs:/app/outputs
    command: ["python", "augment.py", "--num-samples", "64", "--num-aug", "4"]

volumes:
  mnist_data:
  mnist_outputs: