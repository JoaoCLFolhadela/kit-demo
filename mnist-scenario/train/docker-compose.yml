services:
  mnist-train:
    build: .
    container_name: mnist-train
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - mnist_data:/app/data
      - mnist_outputs:/app/outputs
    command: ["python", "train.py", "--epochs", "3", "--batch-size", "128", "--lr", "0.001"]

volumes:
  mnist_data:
  mnist_outputs: